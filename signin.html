<!DOCTYPE html>
<html lang="en" style="background-color: gray;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign in</title>
</head>
<body>
    
    <form action="">

        <label for="username" style="color: white;">username:</label>
        <input placeholder="Enter Username"  style="background-color: whitesmoke;" type="text" id="username" minlength="6" maxlength="13" required>

        <br>

        <label style="color: white;" for="password">password:</label>
        <input placeholder="1234567890" type="password" style="background-color: whitesmoke;" minlength="6" maxlength="13" id="password" required>

        <br>

        <label style="color: white;" for="email" for="email">email:</label>
        <input placeholder="user@example.com" type="email" style="background-color: whitesmoke;" id="email" required>

        <br>

        <label style="color: white;" for="phone" for="phone">phone:</label>
        <input placeholder="(XXX) XXX XXXX" type="phone" style="background-color: whitesmoke;" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" id="phone" required>

        <br>

        <label for="bday">birthday</label>
        <input type="date" id="bday">

        <br>

        <label for="quantity">quantity:</label>
        <input type="number" min="0" max="99" value="1" id="quantity">

        <br>

        <label for="Mr.">Mr. :</label>
        <input type="radio" id="Mr">
        <label for="Ms.">Ms. :</label>
        <input type="radio" id="Ms">
        <label for="PhD.">PhD. :</label>
        <input type="radio" id="PhD">

        <br>

        <input style="background-color: white;" type="submit">
        <input style="background-color: white;" type="reset">

    </form>

</body>
</html>
